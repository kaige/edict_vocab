<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iciba生词本</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 iciba生词本</h1>
      <span id="wordCount" class="word-count">0 个单词</span>
    </header>

    <!-- User info bar -->
    <div id="userBar" class="user-bar">
      <div id="userInfo" class="user-info" style="display: none;">
        <span id="userName" class="user-name"></span>
        <button id="syncBtn" class="btn-sync" title="同步到云端">☁️</button>
        <button id="signOutBtn" class="btn-text">退出</button>
      </div>
      <div id="signInPrompt" class="sign-in-prompt">
        <span>登录后可同步生词到云端</span>
        <button id="showSignUpBtn" class="btn-primary">🔗 注册账号</button>
      </div>
    </div>

    <!-- Auth modal -->
    <div id="authModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">登录</h2>
          <button id="closeModal" class="close-btn">×</button>
        </div>
        <div class="modal-body">
          <input type="email" id="authEmail" class="auth-input" placeholder="邮箱">
          <input type="password" id="authPassword" class="auth-input" placeholder="密码（至少6位）">
          <p id="authError" class="auth-error"></p>
          <button id="authSubmitBtn" class="btn-primary btn-full">登录</button>
          <p class="auth-switch">
            <span id="authSwitchText">还没有账号？</span>
            <a href="#" id="authSwitchLink">注册</a>
          </p>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索单词...">
      <button id="exportBtn" class="btn btn-secondary">导出</button>
      <button id="clearAllBtn" class="btn btn-danger">清空</button>
    </div>

    <div id="wordList" class="word-list">
      <div class="empty-state">暂无生词，去查几个单词吧！</div>
    </div>

    <!-- Sync status indicator -->
    <div id="syncStatus" class="sync-status"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="firebase-config.js"></script>
  <script src="firebase-app.js"></script>
  <script src="firebase-auth.js"></script>
  <script src="firebase-database.js"></script>
  <script src="firebase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
